name: LaravelShoppingCart Tests

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'phpunit.xml'
      - 'phpstan.neon.dist'
      - 'README.md'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'phpunit.xml'
      - 'phpstan.neon.dist'
      - 'README.md'
      - '.github/workflows/ci.yml'

jobs:
  package-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: '8.3'
            testbench: '^9.0'
          - php: '8.4'
            testbench: '^9.0'
          - php: '8.3'
            testbench: '^10.0'
          - php: '8.4'
            testbench: '^10.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Testbench version for matrix target
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install package dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run package tests
        run: composer test

      - name: Run static analysis
        run: composer analyse
